name: build-image
run-name: Build shimboot disk image for ${{ inputs.board || 'cyan' }}

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      board:
        description: 'Board name (e.g., cyan)'
        required: true
        default: cyan
      desktop:
        description: 'Desktop environment (e.g., xfce, gnome, lxqt, none)'
        required: false
        default: lxqt
      distro:
        description: 'Distro to use for chroot/build (e.g., ubuntu, debian)'
        required: false
        default: debian
      arch:
        description: 'Architecture (e.g., amd64, arm64, x86_64)'
        required: false
        default: x86_64
      release:
        description: 'Distro release'
        required: false
        default: trixie

permissions:
  contents: read

jobs:
  build:
    name: Build shimboot image
    permissions:
      contents: write
    runs-on: ubuntu-latest
    env:
      BOARD: ${{ inputs.board || 'cyan' }}
      DESKTOP: ${{ inputs.desktop || 'lxqt' }}
      DISTRO: ${{ inputs.distro || 'debian' }}
      ARCH: ${{ inputs.arch || 'x86_64' }}
      RELEASE: ${{ inputs.release || 'trixie' }}
    steps:
      - name: Remove snap
        uses: ading2210/gh-actions-remove-snap@v1
        with:
          disable_man_db: 'true'

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Download repository
        uses: actions/checkout@v4

      - name: Run build
        run: |
          sudo apt-get update
          sudo apt-get upgrade -y
          sudo env DEBUG=1 ./build_complete.sh "${BOARD}" compress_img=1 quiet=1 desktop="${DESKTOP}" arch="${ARCH}" distro="${DISTRO}" release="${RELEASE}"

      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: shimboot_${{ env.BOARD }}
          path: data/shimboot_${{ env.BOARD }}.bin
          compression-level: 7
          if-no-files-found: error

      - name: Create release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          files: data/shimboot_${{ env.BOARD }}.zip
