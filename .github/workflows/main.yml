name: build-image-og
run-name: Build the shimboot disk image for all boards
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      desktop:
        description: 'Desktop environment (e.g., xfce, gnome, lxqt , none)'
        required: false
        default: ''
      distro:
        description: 'Distro to use for chroot/build (e.g., ubuntu, debian)'
        required: false
        default: 'debian'
      arch:
        description: 'Architecture (e.g., amd64, arm64, x86_64)'
        required: false
        default: 'x86_64'
      release:
        description: 'Distro release'
        required: false
        default: 'trixie'

jobs:
  build:
    permissions:
      contents: write

    strategy: 
      matrix:
        board: [cyan]

    runs-on: ubuntu-latest
    env:
      DESKTOP: ${{ github.event.inputs.desktop || 'kde' }}
      DISTRO: ${{ github.event.inputs.distro || 'debian' }}
      ARCH: ${{ github.event.inputs.arch || 'amd64' }}
      RELEASE: ${{ github.event.inputs.release || 'trixie' }}
    steps:
      - name: remove snap
        uses: ading2210/gh-actions-remove-snap@v1
        with:
          disable_man_db: 'true'

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: download repo
        uses: actions/checkout@v4
      
      - name: run build
        run: |
          sudo apt autoremove -y
          sudo apt-get update
          sudo apt-get upgrade -y
          sudo apt-get install zstd -y
          sudo DEBUG=1 ./build_complete.sh ${{ matrix.board }} compress_img=1 quiet=1 desktop=${{ env.DESKTOP }} arch=${{ env.ARCH }} distro=${{ env.DISTRO }} release=${{ env.RELEASE }}

      - name: upload img
        uses: actions/upload-artifact@v4
        with:
          name: shimboot_${{ matrix.board }}
          path: data/shimboot_${{ matrix.board }}.bin
          compression-level: 7
  
      - name: create release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          files: data/shimboot_${{ matrix.board }}.zip
